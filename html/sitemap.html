<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitemap | The Biz Gift</title>
  <link rel="icon" type="image/png" href="image/TBG Logo New.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="pages.css">
  <style>
    .utility-header {
      background-color: var(--bg-ivory);
      padding: 6rem var(--space-layout) 2rem var(--space-layout);
      text-align: center;
      border-bottom: 1px solid #EAEAE6;
    }
    .utility-header h1 {
      font-family: var(--font-serif);
      font-size: 3.5rem;
      font-weight: 400;
      color: var(--text-dark);
    }
    .utility-content {
      background-color: #FFFFFF;
      padding: 5rem var(--space-layout) 10rem var(--space-layout);
    }
    .sitemap-grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4rem;
    }
    .sitemap-column h3 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #EAEAE6;
      padding-bottom: 0.5rem;
    }
    .sitemap-column ul {
      list-style: none;
    }
    .sitemap-column li {
      margin-bottom: 1rem;
    }
    .sitemap-column a {
      color: var(--text-muted);
      font-size: 1.1rem;
      transition: color var(--transition-fast);
    }
    .sitemap-column a:hover {
      color: var(--accent-bronze);
    }
    @media (max-width: 768px) {
      .sitemap-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <main>
    <section class="utility-header">
      <h1>Sitemap Matrix</h1>
    </section>
    <section class="utility-content">
      <div class="sitemap-grid">
        <div class="sitemap-column">
          <h3>Primary Navigation</h3>
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/explore/">Explore Gifts</a></li>
            <li><a href="/explore/">Best Sellers</a></li>
            <li><a href="/explore/">Premium Picks</a></li>
            <li><a href="/explore/">Budget Gifting</a></li>
            <li><a href="/customisation.html">Customisation</a></li>
            <li><a href="/about.html">Our Story</a></li>
            <li><a href="/quote.html">Request a Quote</a></li>
          </ul>
        </div>
        <div class="sitemap-column">
          <h3>Utility & Legal</h3>
          <ul>
            <li><a href="/privacy.html">Privacy Policy</a></li>
            <li><a href="/terms.html">Terms & Conditions</a></li>
            <li><a href="/sitemap.html">Sitemap Matrix</a></li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="components.js"></script>
</body>
</html>
